<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>All Routes — Raylane Express</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:#F8FAFD;color:#0A0F1E;line-height:1.55}
a{color:inherit;text-decoration:none}
</style>
</head>
<body>
<nav style="background:#040E35;border-bottom:3px solid #E8A800;padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;">
  <a href="/index.html" style="display:flex;align-items:center;gap:9px;text-decoration:none;">
    <div style="width:32px;height:32px;background:#E8A800;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;color:#040E35;">RL</div>
    <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;font-size:18px;color:#fff;">Raylane<span style="color:#E8A800;">Express</span></span>
  </a>
  <div style="display:flex;align-items:center;gap:8px;">
    <a href="/index.html#search" style="background:#E8A800;color:#040E35;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-style:italic;text-transform:uppercase;padding:8px 18px;border-radius:9999px;font-size:14px;text-decoration:none;">Book a Seat</a>
    <a href="/index.html" style="color:rgba(255,255,255,.6);font-size:13px;text-decoration:none;padding:6px 10px;">← Home</a>
  </div>
</nav>
<main style="padding:40px 20px;">
  <div style="max-width:1100px;margin:0 auto;">
    <h1 style="font-family:'Barlow Condensed',sans-serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:900;font-style:italic;text-transform:uppercase;margin-bottom:28px;">All Routes & Timetables</h1>
    
<div style="max-width:1000px;margin:0 auto;">
  <div style="background:#EEF2FA;border-radius:16px;padding:20px;margin-bottom:28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <select id="routeFrom" onchange="filterRoutes()" style="background:#fff;border:1.5px solid #DDE3F0;border-radius:8px;padding:10px 14px;font-size:14px;font-family:'Barlow',sans-serif;cursor:pointer;outline:none;"><option value="">From: All Cities</option><option>Kampala</option><option>Gulu</option><option>Mbarara</option><option>Mbale</option><option>Fort Portal</option></select>
    <select id="routeTo" onchange="filterRoutes()" style="background:#fff;border:1.5px solid #DDE3F0;border-radius:8px;padding:10px 14px;font-size:14px;font-family:'Barlow',sans-serif;cursor:pointer;outline:none;"><option value="">To: All Cities</option><option>Mbarara</option><option>Gulu</option><option>Mbale</option><option>Fort Portal</option><option>Kabale</option><option>Arua</option><option>Nairobi</option><option>Kigali</option></select>
    <button onclick="filterRoutes()" style="background:#0B2FA0;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-style:italic;text-transform:uppercase;padding:10px 22px;border:none;border-radius:9999px;font-size:14px;cursor:pointer;">Filter Routes</button>
  </div>
  <div id="routeList" style="display:grid;grid-template-columns:1fr;gap:14px;"></div>
</div>
<script>
const ROUTES=[
  {from:'Kampala',to:'Mbarara',time:'06:00, 08:00, 10:00, 14:00',dur:'3.5 hrs',price:'UGX 22,000–28,000',ops:'Global Coaches, YY Coaches, Link Bus',freq:'Daily'},
  {from:'Kampala',to:'Gulu',time:'06:30, 08:00, 10:00',dur:'5 hrs',price:'UGX 28,000–35,000',ops:'Link Bus, Fast Coaches',freq:'Daily'},
  {from:'Kampala',to:'Mbale',time:'07:00, 09:00, 11:00',dur:'3 hrs',price:'UGX 20,000–25,000',ops:'YY Coaches, Global Coaches',freq:'Daily'},
  {from:'Kampala',to:'Fort Portal',time:'07:00, 10:00',dur:'5 hrs',price:'UGX 28,000–35,000',ops:'Raylane Express, Global Coaches',freq:'Daily'},
  {from:'Kampala',to:'Kabale',time:'07:00, 09:00',dur:'6 hrs',price:'UGX 26,000–32,000',ops:'Fast Coaches, YY Coaches',freq:'Daily'},
  {from:'Kampala',to:'Arua',time:'07:00',dur:'8 hrs',price:'UGX 32,000–40,000',ops:'Global Coaches',freq:'Daily'},
  {from:'Kampala',to:'Jinja',time:'07:00, 09:00, 11:00, 13:00, 15:00',dur:'1.5 hrs',price:'UGX 8,000–12,000',ops:'Multiple operators',freq:'Daily'},
  {from:'Kampala',to:'Soroti',time:'07:00, 09:00',dur:'4.5 hrs',price:'UGX 20,000–26,000',ops:'Link Bus',freq:'Daily'},
  {from:'Kampala',to:'Lira',time:'07:00, 09:00',dur:'5 hrs',price:'UGX 24,000–30,000',ops:'Fast Coaches, Link Bus',freq:'Daily'},
  {from:'Kampala',to:'Masaka',time:'07:00, 09:00, 13:00',dur:'2.5 hrs',price:'UGX 14,000–18,000',ops:'Multiple operators',freq:'Daily'},
  {from:'Kampala',to:'Kasese',time:'07:00',dur:'6 hrs',price:'UGX 30,000–38,000',ops:'Global Coaches',freq:'Daily'},
  {from:'Kampala',to:'Hoima',time:'08:00, 11:00',dur:'3.5 hrs',price:'UGX 20,000–26,000',ops:'YY Coaches',freq:'Daily'},
  {from:'Kampala',to:'Nairobi',time:'08:00',dur:'12 hrs',price:'UGX 80,000–100,000',ops:'Raylane Express',freq:'Daily'},
  {from:'Kampala',to:'Kigali',time:'07:00',dur:'10 hrs',price:'UGX 75,000–95,000',ops:'Raylane Express, Global Coaches',freq:'Daily'},
  {from:'Mbarara',to:'Kampala',time:'05:30, 07:00, 09:00',dur:'3.5 hrs',price:'UGX 22,000–28,000',ops:'Multiple operators',freq:'Daily'},
  {from:'Gulu',to:'Kampala',time:'06:00, 08:00',dur:'5 hrs',price:'UGX 28,000–35,000',ops:'Link Bus',freq:'Daily'},
];
function renderRoutes(list){
  const el=document.getElementById('routeList');
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#9CA3AF;font-size:16px;">No routes found for this filter. <a href="/index.html#search" style="color:#0B2FA0;font-weight:600;">Book directly</a></div>';return;}
  el.innerHTML=list.map(r=>`
    <div style="background:#fff;border:1px solid #DDE3F0;border-radius:16px;padding:20px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px;">
      <div style="flex:1;min-width:200px;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;font-style:italic;text-transform:uppercase;color:#0A0F1E;margin-bottom:4px;">${r.from} → ${r.to}</div>
        <div style="font-size:13px;color:#4B5563;margin-bottom:2px;">⏱ ${r.dur} &nbsp;·&nbsp; 🚌 ${r.ops}</div>
        <div style="font-size:13px;color:#4B5563;margin-bottom:2px;">🕐 Departures: ${r.time}</div>
        <div style="font-size:13px;color:#4B5563;">📅 ${r.freq}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;color:#0B2FA0;">${r.price}</div>
        <a href="/index.html#search" style="background:#E8A800;color:#040E35;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-style:italic;text-transform:uppercase;padding:10px 22px;border-radius:9999px;font-size:14px;text-decoration:none;white-space:nowrap;">Book This Route</a>
      </div>
    </div>
  `).join('');
}
function filterRoutes(){
  const f=document.getElementById('routeFrom').value;
  const t=document.getElementById('routeTo').value;
  const filtered=ROUTES.filter(r=>(!f||r.from===f)&&(!t||r.to===t));
  renderRoutes(filtered);
}
renderRoutes(ROUTES);
</script>
  </div>
</main>

    <a href="/pages/contact.html" style="color:rgba(255,255,255,.4);">Contact</a>
  </p>
</footer>
</body>
</html>
