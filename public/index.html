<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <meta name="theme-color" content="#1D428A"/>
  <meta name="description" content="Raylane Express — Uganda's Premier Transport Platform"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <title>Raylane Express</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      /* Golden State Warriors palette */
      --gsw-blue:#1D428A;
      --gsw-gold:#FFC72C;
      --gsw-blue-dark:#102048;
      --gsw-blue-mid:#2a5ba8;
      --gsw-gold-dark:#d4a500;
      --gsw-gold-light:#FFF4CC;
      --gsw-white:#FFFFFF;
      /* App aliases */
      --navy:var(--gsw-blue);
      --navy-dark:var(--gsw-blue-dark);
      --gold:var(--gsw-gold);
      --gold-light:var(--gsw-gold-light);
      --gold-dark:var(--gsw-gold-dark);
      --green:#00C896;
      --green-light:#E0FFF6;
      --red:#EF4444;
      --white:#FFFFFF;
      --gray-50:#F7F8FA;
      --gray-100:#EEF0F4;
      --gray-200:#DDE1EA;
      --gray-300:#BBC3D4;
      --gray-400:#8A95AA;
      --gray-600:#4A5568;
      --gray-800:#1A2035;
      --font-display:'Syne',sans-serif;
      --font-body:'Outfit',sans-serif;
      --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:24px;
      --shadow-sm:0 1px 4px rgba(29,66,138,0.08);
      --shadow-md:0 4px 16px rgba(29,66,138,0.12);
      --shadow-lg:0 8px 32px rgba(29,66,138,0.18);
    }
    html,body,#root{height:100%;font-family:var(--font-body);background:var(--gray-50);color:var(--gray-800)}
    button,input,select,textarea{font-family:var(--font-body)}
    a{color:inherit;text-decoration:none}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:99px}
    .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
  </style>
</head>
<body><div id="root"></div></body>
</html>
